<?xml version="1.0" encoding="UTF-8"?>
<!--
  Timeline Horizontal Template (历史里程碑)
  示例: AI 五个时代 / DL 里程碑 / Transformer 演进史
  使用方法:
    1. 改顶部标题
    2. 改主轴长度 (主线 stroke length)
    3. 节点位置: 沿主线均匀分布
    4. 上下交错的标签 (奇偶交替) 避免拥挤
-->
<svg viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic" font-weight="600" font-size="20"
        fill="var(--dia-stroke)">时间轴标题</text>
  <text x="400" y="54" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic" font-size="13"
        fill="var(--dia-stroke-soft)">English subtitle</text>

  <!-- ========== 主时间轴 (水平细线) ========== -->
  <line x1="60" y1="140" x2="740" y2="140"
        stroke="var(--dia-stroke)" stroke-width="2"/>
  <!-- 右端箭头 -->
  <polygon points="740,140 730,135 730,145" fill="var(--dia-stroke)"/>

  <!-- ========== 节点 1 (左端, 标签向上) ========== -->
  <circle cx="120" cy="140" r="8" fill="var(--dia-bg-card)" stroke="var(--dia-stroke)" stroke-width="2"/>
  <line x1="120" y1="132" x2="120" y2="115"
        stroke="var(--dia-stroke-soft)" stroke-width="1"/>
  <text x="120" y="105" text-anchor="middle"
        font-family="JetBrains Mono, monospace" font-size="12"
        fill="var(--dia-accent)">1956</text>
  <text x="120" y="88" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-weight="600" font-size="13"
        fill="var(--dia-stroke)">里程碑 1</text>
  <text x="120" y="72" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic" font-size="11"
        fill="var(--dia-stroke-soft)">Dartmouth Conf.</text>

  <!-- ========== 节点 2 (标签向下) ========== -->
  <circle cx="240" cy="140" r="8" fill="var(--dia-bg-card)" stroke="var(--dia-stroke)" stroke-width="2"/>
  <line x1="240" y1="148" x2="240" y2="165"
        stroke="var(--dia-stroke-soft)" stroke-width="1"/>
  <text x="240" y="180" text-anchor="middle"
        font-family="JetBrains Mono, monospace" font-size="12"
        fill="var(--dia-accent)">1986</text>
  <text x="240" y="198" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-weight="600" font-size="13"
        fill="var(--dia-stroke)">里程碑 2</text>
  <text x="240" y="214" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic" font-size="11"
        fill="var(--dia-stroke-soft)">Backpropagation</text>

  <!-- ========== 节点 3 (向上, 高亮) ========== -->
  <circle cx="380" cy="140" r="10" fill="var(--dia-accent)" stroke="var(--dia-stroke)" stroke-width="2"/>
  <line x1="380" y1="130" x2="380" y2="115"
        stroke="var(--dia-stroke-soft)" stroke-width="1"/>
  <text x="380" y="105" text-anchor="middle"
        font-family="JetBrains Mono, monospace" font-size="12"
        fill="var(--dia-accent)">2012</text>
  <text x="380" y="88" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-weight="600" font-size="13"
        fill="var(--dia-stroke)">关键转折点</text>
  <text x="380" y="72" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic" font-size="11"
        fill="var(--dia-stroke-soft)">AlexNet</text>

  <!-- ========== 节点 4 (向下) ========== -->
  <circle cx="520" cy="140" r="8" fill="var(--dia-bg-card)" stroke="var(--dia-stroke)" stroke-width="2"/>
  <line x1="520" y1="148" x2="520" y2="165"
        stroke="var(--dia-stroke-soft)" stroke-width="1"/>
  <text x="520" y="180" text-anchor="middle"
        font-family="JetBrains Mono, monospace" font-size="12"
        fill="var(--dia-accent)">2017</text>
  <text x="520" y="198" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-weight="600" font-size="13"
        fill="var(--dia-stroke)">里程碑 4</text>
  <text x="520" y="214" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic" font-size="11"
        fill="var(--dia-stroke-soft)">Transformer</text>

  <!-- ========== 节点 5 (向上) ========== -->
  <circle cx="660" cy="140" r="8" fill="var(--dia-bg-card)" stroke="var(--dia-stroke)" stroke-width="2"/>
  <line x1="660" y1="132" x2="660" y2="115"
        stroke="var(--dia-stroke-soft)" stroke-width="1"/>
  <text x="660" y="105" text-anchor="middle"
        font-family="JetBrains Mono, monospace" font-size="12"
        fill="var(--dia-accent)">2022</text>
  <text x="660" y="88" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-weight="600" font-size="13"
        fill="var(--dia-stroke)">里程碑 5</text>
  <text x="660" y="72" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic" font-size="11"
        fill="var(--dia-stroke-soft)">ChatGPT</text>

  <!-- ========== 时代分隔 (虚线, 可选) ========== -->
  <line x1="310" y1="125" x2="310" y2="155"
        stroke="var(--dia-stroke-soft)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="310" y="240" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic" font-size="11"
        fill="var(--dia-stroke-tertiary)">← 经典 AI / DL 时代 →</text>
  <line x1="450" y1="125" x2="450" y2="155"
        stroke="var(--dia-stroke-soft)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="595" y="240" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic" font-size="11"
        fill="var(--dia-stroke-tertiary)">← 大模型时代 →</text>
</svg>
